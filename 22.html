<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<title>ORIX Financial Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#003F87;
  --danger:#E30613;
  --bg:#F4F7F9;
  --border:#D6DEE6;
}
*{box-sizing:border-box;font-family:'Kanit',sans-serif;}
body{margin:0;background:linear-gradient(180deg,#F4F7F9,#E9EEF3);}
header{
  background:var(--primary);
  color:#fff;
  padding:1.4rem;
  text-align:center;
  font-weight:700;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
}
.container{max-width:1100px;margin:25px auto;padding:15px;}
.grid{display:grid;grid-template-columns:1fr;gap:20px;}
@media(min-width:900px){.grid{grid-template-columns:1fr 1fr;}}

.card{
  background:#fff;
  border-radius:14px;
  padding:20px;
  border:1px solid var(--border);
  box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.card-title{
  font-weight:700;
  margin-bottom:15px;
  color:var(--primary);
  border-left:4px solid var(--danger);
  padding-left:10px;
}

input,select{
  width:100%;
  padding:11px;
  border-radius:8px;
  border:1px solid var(--border);
  text-align:right;
}
input:focus,select:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(0,63,135,.12);
}
input[readonly]{background:#F1F5F9;font-weight:700;color:var(--primary);}

.input-combo{display:flex;gap:10px;}
.w-30{width:100px;flex-shrink:0;}

.segmented-control{
  display:flex;background:#F1F5F9;
  padding:4px;border-radius:8px;gap:4px;
}
.seg-btn{
  flex:1;border:none;background:transparent;
  padding:8px;border-radius:6px;
  cursor:pointer;font-weight:600;
}
.seg-btn.active{
  background:#fff;color:var(--primary);
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.result-area{
  background:linear-gradient(135deg,#003F87,#001F4D);
  color:#fff;padding:25px;
  border-radius:14px;text-align:center;
  margin-top:15px;
}
.res-val{font-size:2.8rem;font-weight:800;}

.btn{
  width:100%;padding:12px;
  border-radius:8px;border:none;
  font-weight:700;cursor:pointer;margin-top:10px;
}
.btn-target{
  background:#fff;color:var(--danger);
  border:2px solid var(--danger);
}
.btn-target:hover{
  background:var(--danger);color:#fff;
}

.ows-table{width:100%;border-collapse:collapse;}
.ows-table th,.ows-table td{
  padding:10px;border-bottom:1px solid #E2E8F0;
}
.ows-table th{background:#F8FAFC;}
.highlight{color:var(--primary);font-weight:700;}
</style>
</head>

<body>

<header>ORIX Financial Calculator</header>

<div class="container">
<div class="grid">

<!-- LEFT -->
<div class="card">
<div class="card-title">ข้อมูลรถ</div>

<input id="carPrice" placeholder="ราคารถ (Gross)">
<input id="discount" placeholder="ส่วนลด">
<input id="option" placeholder="Option">

<hr>

<div class="input-combo">
<select id="downType" class="w-30">
<option value="percent">%</option>
<option value="amount">บาท</option>
</select>
<input id="downIn" placeholder="เงินดาวน์">
</div>

<input id="resFinDisplay" readonly placeholder="ยอดจัด">

<label style="display:flex;align-items:center;gap:8px;margin-top:10px;">
<input type="checkbox" id="hasBalloon" style="width:auto;">
บอลลูน (Balloon)
</label>

<div id="balRow" class="input-combo" style="display:none;margin-top:8px;">
<select id="balType" class="w-30">
<option value="percent">%</option>
<option value="amount">บาท</option>
</select>
<input id="balIn" placeholder="Balloon">
</div>

<input id="termYears" type="number" placeholder="จำนวนปี">

<button class="btn btn-target" onclick="solveDown(36000)">FIX 36,000</button>

</div>

<!-- RIGHT -->
<div class="card">
<div class="card-title">ดอกเบี้ย</div>

<select id="calcMode">
<option value="flat">Flat</option>
<option value="yield">IRR</option>
</select>

<input id="flatRate" placeholder="Flat Rate %">
<input id="irrTarget" placeholder="IRR %">

<div class="segmented-control">
<button class="seg-btn active" id="btnBaseInt">จากดอกเบี้ย</button>
<button class="seg-btn" id="btnBaseFin">จากยอดจัด</button>
</div>
<input type="hidden" id="comBase" value="interest">

<div class="input-combo" style="margin-top:10px;">
<input id="comPct" placeholder="%">
<input id="comExtra" placeholder="Extra">
</div>

<div class="result-area">
<div>ค่างวด</div>
<div id="resLease" class="res-val">0</div>
<div>TR: <span id="resTr">0.0000%</span></div>
<div>ค่าคอม: <span id="resCommTotal">0</span></div>
</div>
</div>

</div>

<div class="card" style="margin-top:20px;">
<table class="ows-table">
<thead>
<tr><th>รายการ</th><th>Ex VAT</th><th>Inc VAT</th></tr>
</thead>
<tbody id="owsBody"></tbody>
</table>
</div>

</div>

<script>
const VAT=1.07;
const uncomma=s=>parseFloat(String(s).replace(/,/g,''))||0;
const format=(n,d=2)=>new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n||0);
const formatInt=n=>new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(n||0);

function roundMoney(n,d=2){
const f=Math.pow(10,d);
return Math.round((n+Number.EPSILON)*f)/f;
}
function roundBaht(n){return Math.round(n);}

function calculateIRR(nper,pmt,pv,fv=0){
if(!nper||!pmt)return 0;
let rate=0.05/12;
for(let i=0;i<200;i++){
let f=pv;
for(let t=1;t<=nper;t++)f+=pmt/Math.pow(1+rate,t);
f+=fv/Math.pow(1+rate,nper);
let df=0;
for(let t=1;t<=nper;t++)df-=(t*pmt)/Math.pow(1+rate,t+1);
df-=(nper*fv)/Math.pow(1+rate,nper+1);
rate=rate-f/df;
}
return rate;
}

function setComBase(val){
comBase.value=val;
btnBaseInt.classList.toggle('active',val==='interest');
btnBaseFin.classList.toggle('active',val==='finance');
calculate();
}
btnBaseInt.onclick=()=>setComBase('interest');
btnBaseFin.onclick=()=>setComBase('finance');

function validateBalloon(price){
if(!hasBalloon.checked)return 0;
const max=price*0.35;
if(balType.value==='percent'){
let pct=uncomma(balIn.value);
if(pct>35){pct=35;balIn.value=35;}
return price*(pct/100);
}else{
let amt=uncomma(balIn.value);
if(amt>max){amt=max;balIn.value=format(max);}
return amt;
}
}

function calculate(){
const price=uncomma(carPrice.value);
if(price<=0){
resFinDisplay.value="0.00";
resLease.innerText="0";
resTr.innerText="0.0000%";
resCommTotal.innerText="0";
return 0;
}

const net=roundMoney(price-uncomma(discount.value)+uncomma(option.value));
const down=downType.value==='percent'?net*(uncomma(downIn.value)/100):uncomma(downIn.value);
const bal=validateBalloon(price);
const finance=roundMoney(net-down);
resFinDisplay.value=format(finance);

const years=parseInt(termYears.value)||0;
const months=years*12;
if(!months)return 0;

let flatVal=0,lease=0;
const mode=calcMode.value;
const comPct=uncomma(comPct.value)/100;
const extra=uncomma(comExtra.value);

flatRate.readOnly=(mode==='yield');
irrTarget.readOnly=(mode==='flat');

if(mode==='flat'){
flatVal=uncomma(flatRate.value);
const totalInt=(finance-bal)*(flatVal/100)*years;
lease=roundBaht((finance-bal+totalInt)/months);
}else{
let target=uncomma(irrTarget.value)/100;
let low=0,high=20;
for(let i=0;i<30;i++){
let mid=(low+high)/2;
let int=(finance-bal)*(mid/100)*years;
let pmt=(finance-bal+int)/months;
let base=comBase.value==='interest'?int:finance;
let comm=(base*comPct)+extra;
let irr=calculateIRR(months,pmt/VAT,-((finance+comm)/VAT),bal/VAT)*12;
if(irr<target)low=mid;else high=mid;
}
flatVal=high;
flatRate.value=format(flatVal,2);
const totalInt=(finance-bal)*(flatVal/100)*years;
lease=roundBaht((finance-bal+totalInt)/months);
}

const finalInt=(finance-bal)*(flatVal/100)*years;
const baseVal=comBase.value==='interest'?finalInt:finance;
const commAmt=roundBaht((baseVal*comPct)+extra);

const tr=calculateIRR(months,lease/VAT,-(finance/VAT),bal/VAT)*12*100;

resLease.innerText=formatInt(lease);
resTr.innerText=format(roundMoney(tr,4),4)+"%";
resCommTotal.innerText=formatInt(commAmt);

const rows=[
{n:"ราคาสุทธิ",v:net},
{n:"ยอดจัด",v:finance},
{n:"ค่างวด",v:lease},
{n:"ค่าคอม",v:commAmt}
];
owsBody.innerHTML=rows.map(r=>`<tr><td>${r.n}</td><td>${format(r.v/VAT)}</td><td class="highlight">${format(r.v)}</td></tr>`).join("");

return lease;
}

function solveDown(target){
downType.value='amount';
let low=0,high=uncomma(carPrice.value);
for(let i=0;i<40;i++){
let mid=(low+high)/2;
downIn.value=mid;
let pmt=calculate();
if(pmt>target)low=mid;else high=mid;
}
downIn.value=format(high);
calculate();
}

['carPrice','discount','option','downIn','balIn','flatRate','irrTarget','comPct','comExtra']
.forEach(id=>{
document.getElementById(id).addEventListener('input',calculate);
});

termYears.addEventListener('input',calculate);
calcMode.addEventListener('change',calculate);
downType.addEventListener('change',calculate);
balType.addEventListener('change',calculate);
hasBalloon.addEventListener('change',()=>{
balRow.style.display=hasBalloon.checked?'flex':'none';
calculate();
});
</script>

</body>
</html>
