<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<title>ORIX Financial Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--orix-blue:#003F87;
--orix-red:#E30613;
--bg-body:#F4F7F9;
--border:#B0C4D4;
--input-edit:#FFFFF0;
--input-read:#EAEFF3;
}
*{box-sizing:border-box;font-family:'Kanit',sans-serif;}
body{background:var(--bg-body);margin:0}
header{background:var(--orix-blue);color:#fff;padding:1.2rem;text-align:center;border-bottom:4px solid var(--orix-red)}
.container{max-width:1000px;margin:15px auto;padding:10px}
.grid{display:grid;grid-template-columns:1fr;gap:15px}
@media(min-width:768px){.grid{grid-template-columns:1fr 1fr}}
.card{background:#fff;border-radius:8px;padding:15px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card-title{font-size:1.1rem;font-weight:700;color:var(--orix-blue);margin-bottom:15px;border-left:5px solid var(--orix-red);padding-left:10px}
input,select{padding:10px;border:1px solid var(--border);border-radius:5px;width:100%;text-align:right;background:var(--input-edit)}
input[readonly]{background:var(--input-read);font-weight:700;color:var(--orix-blue)}
.input-combo{display:flex;gap:8px}
.w-30{width:100px;flex-shrink:0}
.segmented-control{display:flex;background:#EEE;padding:2px;border-radius:6px;margin-top:5px}
.seg-btn{flex:1;border:none;padding:8px;border-radius:4px;cursor:pointer;font-weight:600;background:transparent}
.seg-btn.active{background:#fff;color:var(--orix-blue);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.result-area{background:linear-gradient(135deg,var(--orix-blue),#00264d);color:#fff;padding:20px;border-radius:8px;text-align:center;margin-top:15px}
.res-val{font-size:2.5rem;font-weight:800}
.btn{width:100%;padding:12px;border:none;border-radius:6px;cursor:pointer;font-weight:700;margin-top:10px}
.btn-target{background:#fff;color:var(--orix-red);border:2px solid var(--orix-red)}
.ows-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:10px}
.ows-table th{background:#F1F5F9;padding:10px;border-bottom:2px solid var(--border)}
.ows-table td{padding:10px;border-bottom:1px solid #E2E8F0}
.highlight{color:var(--orix-blue);font-weight:700}
</style>
</head>
<body>

<header><h1>ORIX Financial Calculator</h1></header>

<div class="container">
<div class="grid">

<div class="card">
<div class="card-title">ข้อมูลตัวรถ</div>
<input id="carPrice" type="text" placeholder="ราคารถ">
<div class="input-combo">
<input id="discount" type="text" placeholder="ส่วนลด">
<input id="option" type="text" placeholder="Option">
</div>

<hr>

<div class="input-combo">
<select id="downType" class="w-30">
<option value="percent">%</option>
<option value="amount">บาท</option>
</select>
<input id="downIn" type="text" placeholder="เงินดาวน์">
</div>

<input id="resFinDisplay" readonly placeholder="ยอดจัด">

<label style="display:flex;align-items:center;gap:6px;margin-top:8px;">
<input type="checkbox" id="hasBalloon">
บอลลูน (Balloon)
</label>

<div id="balRow" class="input-combo" style="display:none;margin-top:6px;">
<select id="balType" class="w-30">
<option value="percent">%</option>
<option value="amount">บาท</option>
</select>
<input id="balIn" type="text" placeholder="Balloon">
</div>

<input id="termYears" type="number" placeholder="จำนวนปี">

<button class="btn btn-target" onclick="solveDown(36000)">FIX 36,000</button>
</div>

<div class="card">
<div class="card-title">ดอกเบี้ย</div>

<select id="calcMode">
<option value="flat">Flat</option>
<option value="yield">IRR</option>
</select>

<input id="flatRate" type="text" placeholder="Flat %">
<input id="irrTarget" type="text" placeholder="IRR %">

<div class="segmented-control">
<button class="seg-btn active" id="btnBaseInt" onclick="setComBase('interest')">จากดอกเบี้ย</button>
<button class="seg-btn" id="btnBaseFin" onclick="setComBase('finance')">จากยอดจัด</button>
</div>

<input type="hidden" id="comBase" value="interest">

<div class="input-combo" style="margin-top:10px;">
<input id="comPct" type="text" placeholder="%">
<input id="comExtra" type="text" placeholder="Extra">
</div>

<div class="result-area">
<div>ค่างวด</div>
<div id="resLease" class="res-val">0</div>
<div>TR: <span id="resTr">0.0000%</span></div>
<div>ค่าคอม: <span id="resCommTotal">0</span></div>
</div>

</div>
</div>

<div class="card" style="margin-top:20px;">
<table class="ows-table">
<thead><tr><th>รายการ</th><th>Ex VAT</th><th>Inc VAT</th></tr></thead>
<tbody id="owsBody"></tbody>
</table>
</div>
</div>

<script>
const uncomma=s=>parseFloat(String(s).replace(/,/g,''))||0;
const format=(n,d=2)=>isNaN(n)?"0.00":new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
const formatInt=n=>isNaN(n)?"0":new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(n);

function calculateIRR(nper,pmt,pv,fv=0){
if(pmt===0||nper===0)return 0;
let rate=0.05/12;
for(let i=0;i<500;i++){
let f=pv;
for(let t=1;t<=nper;t++)f+=pmt/Math.pow(1+rate,t);
f+=fv/Math.pow(1+rate,nper);
let df=0;
for(let t=1;t<=nper;t++)df-=(t*pmt)/Math.pow(1+rate,t+1);
df-=(nper*fv)/Math.pow(1+rate,nper+1);
if(Math.abs(f)<1e-8)return rate;
rate=rate-f/df;
}
return rate;
}

function setComBase(val){
comBase.value=val;
btnBaseInt.classList.toggle('active',val==='interest');
btnBaseFin.classList.toggle('active',val==='finance');
calculate();
}

/* ===== BALLOON LOCK 35% ===== */
function validateBalloon(net){
if(!hasBalloon.checked)return 0;
let max=net*0.35;
if(balType.value==='percent'){
let pct=uncomma(balIn.value);
if(pct>35){pct=35;balIn.value=35;}
return net*(pct/100);
}else{
let amt=uncomma(balIn.value);
if(amt>max){amt=max;balIn.value=format(max);}
return amt;
}
}

function calculate(){
const price=uncomma(carPrice.value);
if(price===0)return;

const net=price-uncomma(discount.value)+uncomma(option.value);
const downAmt=downType.value==='percent'?net*(uncomma(downIn.value)/100):uncomma(downIn.value);
const balAmt=validateBalloon(net);
const finance=net-downAmt;
resFinDisplay.value=format(finance);

const years=parseInt(termYears.value)||0;
const months=years*12;
const mode=calcMode.value;

let flatVal=0,leaseInVat=0;
const comPctVal=uncomma(comPct.value)/100;
const extra=uncomma(comExtra.value);

flatRate.readOnly=(mode==='yield');
irrTarget.readOnly=(mode==='flat');

if(mode==='flat'){
flatVal=uncomma(flatRate.value);
const totalInt=(finance-balAmt)*(flatVal/100)*years;
leaseInVat=months>0?(finance-balAmt+totalInt)/months:0;
}else{
const targetIrr=uncomma(irrTarget.value)/100;
let low=0,high=20;
for(let i=0;i<25;i++){
let mid=(low+high)/2;
let it=(finance-balAmt)*(mid/100)*years;
let pmt=(finance-balAmt+it)/months;
let cBase=comBase.value==='interest'?it:finance;
let cAmt=(cBase*comPctVal)+extra;
let curIrr=calculateIRR(months,pmt/1.07,-((finance+cAmt)/1.07),balAmt/1.07)*12;
if(curIrr<targetIrr)low=mid;else high=mid;
}
flatVal=high;
flatRate.value=format(flatVal,2);
const totalInt=(finance-balAmt)*(flatVal/100)*years;
leaseInVat=(finance-balAmt+totalInt)/months;
}

const finalInt=(finance-balAmt)*(flatVal/100)*years;
const comAmt=Math.round(((comBase.value==='interest'?finalInt:finance)*comPctVal)+extra);

resLease.innerText=formatInt(leaseInVat);

const trFinal=months>0?calculateIRR(months,leaseInVat/1.07,-(finance/1.07),balAmt/1.07)*12*100:0;
resTr.innerText=format(trFinal,4)+"%";
resCommTotal.innerText=formatInt(comAmt);

const rows=[
{n:"ราคาสุทธิ",v:net},
{n:"เงินดาวน์",v:downAmt},
{n:"ยอดจัด",v:finance},
{n:"ค่างวด",v:leaseInVat},
{n:"ค่าคอม",v:comAmt},
{n:"RV (Deposit+Balloon)",v:downAmt+balAmt}
];
owsBody.innerHTML=rows.map(r=>`<tr><td>${r.n}</td><td>${format(r.v/1.07)}</td><td class="highlight">${format(r.v)}</td></tr>`).join("");
return leaseInVat;
}

function solveDown(target){
downType.value='amount';
const net=uncomma(carPrice.value)-uncomma(discount.value)+uncomma(option.value);
let low=0,high=net;
for(let i=0;i<40;i++){
let mid=(low+high)/2;
downIn.value=mid.toFixed(2);
let current=calculate();
if(current>target)low=mid;else high=mid;
}
downIn.value=format(high);
calculate();
}

['carPrice','discount','option','downIn','balIn','comPct','comExtra','flatRate','irrTarget']
.forEach(id=>document.getElementById(id).addEventListener('input',calculate));

termYears.addEventListener('input',calculate);
calcMode.addEventListener('change',calculate);
downType.addEventListener('change',calculate);
balType.addEventListener('change',calculate);
hasBalloon.addEventListener('change',()=>{
balRow.style.display=hasBalloon.checked?'flex':'none';
calculate();
});
</script>

</body>
</html>
