<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ORIX Financial Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--blue:#003F87;
--red:#E30613;
--bg:#F4F7F9;
--border:#D6DEE6;
--warn:#DC2626;
}

*{box-sizing:border-box;font-family:'Kanit',sans-serif}
body{margin:0;background:var(--bg)}

header{
background:linear-gradient(135deg,#003F87,#002C5F);
color:#fff;
padding:18px;
text-align:center;
border-bottom:4px solid var(--red);
font-weight:700;
font-size:20px;
}

.container{max-width:1100px;margin:auto;padding:20px}
.grid{display:grid;gap:20px}
@media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 8px 24px rgba(0,0,0,.05);
border:1px solid var(--border);
}

.card-title{
font-weight:700;
color:var(--blue);
margin-bottom:15px;
border-left:5px solid var(--red);
padding-left:10px;
}

.label-row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
font-weight:600;
font-size:14px;
}

input,select{
width:100%;
padding:10px;
border:1px solid var(--border);
border-radius:6px;
text-align:right;
font-size:15px;
}

input[readonly]{background:#EEF2F7;font-weight:700;color:var(--blue)}

.input-combo{display:flex;gap:10px}
.w-30{width:110px}

.result-box{
background:linear-gradient(135deg,#003F87,#001C3D);
color:#fff;
padding:20px;
border-radius:12px;
text-align:center;
margin-top:15px;
}

.res-big{font-size:34px;font-weight:800}

.warn{color:var(--warn);font-weight:700}

.small{font-size:13px;color:#666}

.seg{
display:flex;
background:#EEF2F7;
border-radius:8px;
padding:4px;
margin-top:6px;
}

.seg button{
flex:1;
border:none;
background:transparent;
padding:8px;
font-weight:600;
cursor:pointer;
border-radius:6px;
}

.seg button.active{
background:#fff;
color:var(--blue);
box-shadow:0 2px 6px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<header>ORIX Financial Calculator</header>

<div class="container">
<div class="grid">

<div class="card">
<div class="card-title">ข้อมูลรถ</div>

<div class="label-row">ราคารถ</div>
<input id="carPrice">

<div class="label-row">ส่วนลด / Option</div>
<div class="input-combo">
<input id="discount" placeholder="ส่วนลด">
<input id="option" placeholder="Option">
</div>

<hr>

<div class="label-row">
<span>เงินดาวน์ <span id="downPctMirror" style="color:var(--blue)"></span></span>
</div>
<div class="input-combo">
<select id="downType" class="w-30">
<option value="percent">%</option>
<option value="amount">บาท</option>
</select>
<input id="downIn">
</div>

<div class="label-row">ยอดจัด</div>
<input id="financeShow" readonly>

<div class="label-row">
<label style="display:flex;align-items:center;gap:6px">
<input type="checkbox" id="hasBalloon">
บอลลูน <span id="balPctMirror" style="color:var(--blue)"></span>
</label>
</div>

<div id="balRow" style="display:none" class="input-combo">
<select id="balType" class="w-30">
<option value="percent">%</option>
<option value="amount">บาท</option>
</select>
<input id="balIn">
</div>

<div class="label-row">จำนวนปี</div>
<input id="termYears" type="number">

<button onclick="solveDown(36000)" style="margin-top:10px;width:100%">FIX 36,000</button>

</div>

<div class="card">
<div class="card-title">ดอกเบี้ย</div>

<div class="label-row">โหมด</div>
<select id="mode">
<option value="flat">Flat</option>
<option value="irr">IRR</option>
</select>

<div class="input-combo">
<input id="flatRate" placeholder="Flat %">
<input id="irrRate" placeholder="IRR %">
</div>

<div class="label-row">ค่าคอม</div>
<div class="seg">
<button id="baseInt" class="active" onclick="setBase('interest')">ดอกเบี้ย</button>
<button id="baseFin" onclick="setBase('finance')">ยอดจัด</button>
</div>

<div class="input-combo" style="margin-top:10px">
<input id="comPct" placeholder="%">
<input id="comExtra" placeholder="Extra">
</div>

<div class="result-box">
<div>ค่างวด</div>
<div id="monthly" class="res-big">0</div>
<div>TR: <span id="trRate">0%</span></div>
<div>RV: <span id="rvPct">0%</span> | LTV: <span id="ltvPct">0%</span></div>
<div id="rvWarn"></div>
</div>

</div>
</div>
</div>

<script>
const VAT=1.07
const MAX_BALLOON=0.35

const $=id=>document.getElementById(id)
const uncomma=s=>parseFloat(String(s).replace(/,/g,''))||0
const fmt=(n,d=2)=>new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n)

let comBase="interest"

function setBase(b){
comBase=b
$('baseInt').classList.toggle('active',b==='interest')
$('baseFin').classList.toggle('active',b==='finance')
calculate()
}

function irr(n,pv,pmt,fv=0){
let r=0.05/12
for(let i=0;i<500;i++){
let f=pv
for(let t=1;t<=n;t++)f+=pmt/((1+r)**t)
f+=fv/((1+r)**n)
let df=0
for(let t=1;t<=n;t++)df-=t*pmt/((1+r)**(t+1))
df-=n*fv/((1+r)**(n+1))
if(Math.abs(f)<1e-8)return r
r=r-f/df
}
return r
}

function updateMirror(net,down,bal){
$('downPctMirror').innerText=net?`(${fmt((down/net)*100,2)}%)`:''
$('balPctMirror').innerText=bal?`(${fmt((bal/net)*100,2)}%)`:''
}

function calculate(){

const price=uncomma($('carPrice').value)
if(!price)return

const net=price-uncomma($('discount').value)+uncomma($('option').value)

let down=$('downType').value==='percent'
?net*(uncomma($('downIn').value)/100)
:uncomma($('downIn').value)

let bal=0
if($('hasBalloon').checked){
bal=$('balType').value==='percent'
?net*(uncomma($('balIn').value)/100)
:uncomma($('balIn').value)

if(bal>net*MAX_BALLOON){
bal=net*MAX_BALLOON
$('balIn').value=fmt(bal)
}
}

const finance=net-down
$('financeShow').value=fmt(finance)

updateMirror(net,down,bal)

const years=parseFloat($('termYears').value)||0
const months=years*12
if(!months)return

let flat=uncomma($('flatRate').value)
let pmt=0

if($('mode').value==='flat'){
$('irrRate').readOnly=true
$('flatRate').readOnly=false
const interest=(finance-bal)*(flat/100)*years
pmt=Math.round((finance-bal+interest)/months)
}else{
$('flatRate').readOnly=true
$('irrRate').readOnly=false
const target=uncomma($('irrRate').value)/100
let low=0,high=20
for(let i=0;i<30;i++){
let mid=(low+high)/2
let interest=(finance-bal)*(mid/100)*years
let test=(finance-bal+interest)/months
let r=irr(months,-finance/VAT,test/VAT,bal/VAT)*12
if(r<target)low=mid;else high=mid
}
flat=high
$('flatRate').value=fmt(flat,2)
const interest=(finance-bal)*(flat/100)*years
pmt=Math.round((finance-bal+interest)/months)
}

$('monthly').innerText=fmt(pmt,0)

const tr=irr(months,-finance/VAT,pmt/VAT,bal/VAT)*12*100
$('trRate').innerText=fmt(tr,4)+'%'

const rv=(down+bal)/net*100
const ltv=finance/net*100
$('rvPct').innerText=fmt(rv,2)+'%'
$('ltvPct').innerText=fmt(ltv,2)+'%'

$('rvWarn').innerHTML=rv>40?'<span class="warn">⚠ RV เกิน 40%</span>':''
}

function solveDown(target){
let net=uncomma($('carPrice').value)
let low=0,high=net
for(let i=0;i<40;i++){
let mid=(low+high)/2
$('downIn').value=mid
let pmt=calculate()
if(pmt>target)low=mid;else high=mid
}
$('downIn').value=fmt(high)
calculate()
}

document.querySelectorAll('input,select').forEach(el=>{
el.addEventListener('input',calculate)
})

$('hasBalloon').addEventListener('change',()=>{
$('balRow').style.display=$('hasBalloon').checked?'flex':'none'
calculate()
})
</script>
</body>
</html>
