<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<title>ORIX Financial Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--orix-blue:#003F87;
--orix-red:#E30613;
--bg:#F4F7F9;
--border:#D0D7DE;
--input:#FFFFF0;
--read:#EAEFF3;
}
*{box-sizing:border-box;font-family:'Kanit',sans-serif}
body{margin:0;background:var(--bg);color:#333}

header{
background:var(--orix-blue);
color:#fff;
padding:1.2rem;
text-align:center;
border-bottom:4px solid var(--orix-red);
}

.container{max-width:1100px;margin:20px auto;padding:15px}
.grid{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 4px 14px rgba(0,0,0,.05);
border:1px solid var(--border)
}

.card-title{
font-weight:700;
color:var(--orix-blue);
margin-bottom:15px;
border-left:5px solid var(--orix-red);
padding-left:10px
}

.form-group{margin-bottom:14px}
.label-row{
display:flex;
justify-content:space-between;
font-size:.9rem;
font-weight:600;
margin-bottom:5px
}

input{
width:100%;
padding:10px;
border:1px solid var(--border);
border-radius:6px;
background:var(--input);
text-align:right;
font-size:1rem
}
input[readonly]{background:var(--read);font-weight:700;color:var(--orix-blue)}

.input-combo{display:flex;gap:8px}
.w-30{width:100px}

/* Segmented */
.segmented{
display:flex;
background:#EEF2F7;
padding:4px;
border-radius:8px;
gap:4px
}
.segmented button{
flex:1;
border:none;
padding:8px;
border-radius:6px;
background:transparent;
cursor:pointer;
font-weight:600;
color:#666;
transition:.2s
}
.segmented button.active{
background:#fff;
color:var(--orix-blue);
box-shadow:0 2px 6px rgba(0,0,0,.1)
}

/* Result */
.result{
background:linear-gradient(135deg,var(--orix-blue),#00264d);
color:#fff;
padding:20px;
border-radius:10px;
text-align:center;
margin-top:15px
}
.result .big{font-size:2.4rem;font-weight:800}

.badge{
background:var(--orix-blue);
color:#fff;
padding:4px 8px;
border-radius:20px;
font-size:.7rem;
margin-left:6px
}
</style>
</head>
<body>

<header><h1>ORIX Financial Calculator</h1></header>

<div class="container">
<div class="grid">

<div class="card">
<div class="card-title">ข้อมูลตัวรถ</div>

<div class="form-group">
<div class="label-row">ราคารถ</div>
<input id="carPrice" type="text">
</div>

<div class="form-group">
<div class="label-row">ส่วนลด / Option</div>
<div class="input-combo">
<input id="discount" type="text" placeholder="ส่วนลด">
<input id="option" type="text" placeholder="Option">
</div>
</div>

<hr>

<div class="form-group">
<div class="label-row">
<span>เงินดาวน์</span>
<span id="downMirror"></span>
</div>
<div class="input-combo">
<div class="segmented w-30" id="downToggle">
<button class="active">%</button>
<button>บาท</button>
</div>
<input type="hidden" id="downType" value="percent">
<input id="downIn" type="text">
</div>
</div>

<div class="form-group">
<div class="label-row">
<span>ยอดจัด</span>
<span id="finMirror"></span>
</div>
<input id="resFinDisplay" readonly>
</div>

<div class="form-group">
<div class="label-row">
<label><input type="checkbox" id="hasBalloon"> Balloon</label>
<span id="balMirror"></span>
</div>
<div id="balRow" class="input-combo" style="display:none;margin-top:6px">
<div class="segmented w-30" id="balToggle">
<button class="active">%</button>
<button>บาท</button>
</div>
<input type="hidden" id="balType" value="percent">
<input id="balIn" type="text">
</div>
</div>

<div class="form-group">
<div class="label-row">จำนวนปี</div>
<input id="termYears" type="number" value="4">
</div>

</div>

<div class="card">
<div class="card-title">
โหมดคำนวณ <span id="modeBadge" class="badge">FLAT</span>
</div>

<div class="segmented" id="modeToggle">
<button class="active">Flat</button>
<button>IRR</button>
</div>
<input type="hidden" id="calcMode" value="flat">

<div class="form-group" style="margin-top:15px">
<input id="flatRate" type="text" placeholder="Flat Rate %">
<input id="irrTarget" type="text" placeholder="IRR %" readonly>
</div>

<div class="result">
<div>ค่างวด (In VAT)</div>
<div id="resLease" class="big">0</div>
<div>Customer TR: <span id="resTr">0.0000%</span></div>
</div>
</div>

</div>
</div>

<script>
const uncomma=s=>parseFloat(String(s).replace(/,/g,''))||0;
const fmt=(n,d=2)=>new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
const fmtInt=n=>new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(n);

function calculateIRR(nper,pmt,pv,fv=0){
if(!nper||!pmt)return 0;
let rate=.05/12;
for(let i=0;i<200;i++){
let f=pv;
for(let t=1;t<=nper;t++)f+=pmt/Math.pow(1+rate,t);
f+=fv/Math.pow(1+rate,nper);
let df=0;
for(let t=1;t<=nper;t++)df-=(t*pmt)/Math.pow(1+rate,t+1);
df-=(nper*fv)/Math.pow(1+rate,nper+1);
rate=rate-f/df;
}
return rate;
}

function calculate(){

const price=uncomma(carPrice.value);
if(!price)return;

const net=price-uncomma(discount.value)+uncomma(option.value);

let downAmt=downType.value==='percent'
?net*(uncomma(downIn.value)/100)
:uncomma(downIn.value);

let balAmt=0;
if(hasBalloon.checked){
balAmt=balType.value==='percent'
?net*(uncomma(balIn.value)/100)
:uncomma(balIn.value);

if(balAmt>net*.35){
balAmt=net*.35;
balIn.value=fmt(balAmt,0);
}
}

const finance=net-downAmt;
resFinDisplay.value=fmt(finance);

const years=parseInt(termYears.value)||0;
const months=years*12;

let flat=uncomma(flatRate.value);
let lease=0;

if(calcMode.value==='flat'){
const totalInt=(finance-balAmt)*(flat/100)*years;
lease=(finance-balAmt+totalInt)/months;
}else{
const target=uncomma(irrTarget.value)/100;
let low=0,high=20;
for(let i=0;i<25;i++){
let mid=(low+high)/2;
let it=(finance-balAmt)*(mid/100)*years;
let pmt=(finance-balAmt+it)/months;
let irr=calculateIRR(months,pmt/1.07,-(finance/1.07),balAmt/1.07)*12;
if(irr<target)low=mid;else high=mid;
}
flat=high;
flatRate.value=fmt(flat,2);
const totalInt=(finance-balAmt)*(flat/100)*years;
lease=(finance-balAmt+totalInt)/months;
}

resLease.innerText=fmtInt(lease);

const tr=calculateIRR(months,lease/1.07,-(finance/1.07),balAmt/1.07)*12*100;
resTr.innerText=fmt(tr,4)+'%';

/* Mirror */
downMirror.innerText=downAmt?`(${fmt(downAmt,0)} บาท)`:'';
finMirror.innerText=finance?`(${((finance/net)*100).toFixed(2)}%)`:'';
balMirror.innerText=balAmt?`(${fmt(balAmt,0)} บาท)`:'';

}

/* Toggle */
function initToggle(id,hidden,val1,val2){
const el=document.getElementById(id);
const btn=el.querySelectorAll('button');
btn[0].onclick=()=>{btn[0].classList.add('active');btn[1].classList.remove('active');hidden.value=val1;calculate();}
btn[1].onclick=()=>{btn[1].classList.add('active');btn[0].classList.remove('active');hidden.value=val2;calculate();}
}

initToggle('downToggle',downType,'percent','amount');
initToggle('balToggle',balType,'percent','amount');

modeToggle.querySelectorAll('button')[0].onclick=()=>{
calcMode.value='flat';
modeBadge.innerText='FLAT';
flatRate.readOnly=false;
irrTarget.readOnly=true;
modeToggle.querySelectorAll('button')[0].classList.add('active');
modeToggle.querySelectorAll('button')[1].classList.remove('active');
calculate();
};
modeToggle.querySelectorAll('button')[1].onclick=()=>{
calcMode.value='yield';
modeBadge.innerText='IRR';
flatRate.readOnly=true;
irrTarget.readOnly=false;
modeToggle.querySelectorAll('button')[1].classList.add('active');
modeToggle.querySelectorAll('button')[0].classList.remove('active');
calculate();
};

['carPrice','discount','option','downIn','balIn','flatRate','irrTarget']
.forEach(id=>{
document.getElementById(id).addEventListener('input',e=>{
e.target.value=e.target.value.replace(/[^0-9.]/g,'');
calculate();
});
});

termYears.addEventListener('input',calculate);
hasBalloon.addEventListener('change',()=>{
balRow.style.display=hasBalloon.checked?'flex':'none';
calculate();
});
</script>
</body>
</html>
